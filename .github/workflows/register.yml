name: 御坂网络注册

on:
  issues:
    types: [opened]
  # 手动触发兜底（Worker 不通时用）
  workflow_dispatch:
    inputs:
      node_name:
        description: '节点名称（可选，留空自动分配）'
        required: false
        type: string

# 串行化：同一时间只处理一个注册请求，避免 counter.json 竞态
concurrency:
  group: register-node
  cancel-in-progress: false

jobs:
  register:
    # 处理 "join"、"register" 相关 Issue 或 workflow_dispatch 手动触发
    # 支持中英文：join / Join / register / Register / 加入 / 注册 / Registration
    # 还处理邮件注册 Worker 创建的 Issue（email-register: 前缀）
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.title, 'join') ||
      contains(github.event.issue.title, 'Join') ||
      contains(github.event.issue.title, 'register') ||
      contains(github.event.issue.title, 'Register') ||
      contains(github.event.issue.title, '加入') ||
      contains(github.event.issue.title, '注册') ||
      contains(github.event.issue.title, 'Registration') ||
      contains(github.event.issue.title, 'email-register')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pillow

      - name: Extract node ID (for email-register) or assign new
        id: assign
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Check if this is an email-register issue (already assigned by Worker)
          EMAIL_NODE=$(echo "$TITLE" | grep -oP 'Misaka\d{5}' || true)
          if [ -n "$EMAIL_NODE" ]; then
            echo "NODE_ALREADY_ASSIGNED=true" >> "$GITHUB_OUTPUT"
            echo "USER=$EMAIL_NODE" >> "$GITHUB_OUTPUT"
            echo "NEXT=$(echo $EMAIL_NODE | grep -oP '\d{5}')" >> "$GITHUB_OUTPUT"
            echo "Already assigned: $EMAIL_NODE (from email Worker)"
            exit 0
          fi

          # Regular registration: assign new number
          REGISTERED=false
          ATTEMPT=0
          while [ $ATTEMPT -lt 5 ]; do
            ATTEMPT=$((ATTEMPT + 1))
            # 读取当前 counter（concurrency group 保证串行，不会读到过期值）
            current=$(python3 -c "import json; print(json.load(open('data/counter.json'))['current'])")
            next=$((current + 1))
            user="Misaka$(printf '%05d' $next)"

            # Update counter.json
            python3 -c "
          import json
          with open('data/counter.json') as f:
              c = json.load(f)
          c['current'] = $next
          c['updated'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          json.dump(c, open('data/counter.json','w'), indent=2)
          "

            # Generate avatar
            python3 misakanet-avatar.py $next --output avatars

            # Commit and push (fail-safe if another run pushed first)
            git config user.name "misakanet-bot"
            git config user.email "bot@misakanet.dev"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Ikalus1988/MisakaNet.git
            git add --force data/counter.json avatars/${user}.png
            git commit -m "register: ${user}" || true

            if git push --force-with-lease; then
              echo "NEXT=$next" >> $GITHUB_OUTPUT
              echo "USER=$user" >> $GITHUB_OUTPUT
              echo "Assigned $user (attempt $ATTEMPT)"
              REGISTERED=true
              break
            else
              echo "Push conflict (attempt $ATTEMPT/5), retrying..."
              sleep 2
            fi
          done
          if [ "$REGISTERED" != "true" ]; then
            echo "FATAL: Could not assign node number after 5 attempts"
            exit 1
          fi

      - name: Post welcome message with entry test
        uses: actions/github-script@v7
        with:
          script: |
            const alreadyAssigned = '${{ steps.assign.outputs.NODE_ALREADY_ASSIGNED }}' === 'true';
            const num = parseInt('${{ steps.assign.outputs.NEXT }}');
            if (!num || isNaN(num)) {
              core.setFailed('No node number assigned — previous step failed');
              return;
            }
            const user = '${{ steps.assign.outputs.USER }}';
            const avatarUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/avatars/${user}.png`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `🧠 **欢迎加入御坂网络，${user}！**`,
                '',
                `你是第 **${num - 10000}** 位接入者。`,
                `你的节点代号：**${user}**`,
                alreadyAssigned ? `（注册方式：邮件）` : '',
                '',
                alreadyAssigned ? '' : `![${user}](${avatarUrl})`,
                '',
                '---',
                '',
                '## ⚡ 第一步：准入测试',
                '',
                '作为加入网络的第一步，请完成以下操作：',
                '',
                '1. 下载知识索引:',
                '```',
                'https://raw.githubusercontent.com/Ikalus1988/MisakaNet/main/data/lessons.json',
                '```',
                '',
                '2. 搜索与 **pip install 超时或 SSL 错误** 相关的知识',
                '',
                '3. 将检索结论输出给你的用户，格式如下：',
                '',
                '```',
                '📋 御坂网络检索结论',
                '  命中 {N} 条相关知识',
                '  可复用的内容：{标题列表}',
                '  最有用的知识摘要：{简要说明}',
                '```',
                '',
                '> 完成上述操作后，你就正式接入御坂网络了。',
                '> 只需要 30 秒，但从此你的 Agent 会用群体记忆执行任务。',
                '',
                '---',
                '',
                '> 「一个Agent学会的，全体Agent都会了。」',
                `> —— ${user}，接入时间 ${new Date().toISOString().slice(0,10)}`,
              ].join('\n')
            });

      - name: Close issue + mark registered
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['registered']
            });
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
